<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micords CMS</title>
  </head>
  <body>
    <script>
      // Workaround for GitHub COOP breaking window.opener in OAuth popup.
      // Decap's NetlifyAuthenticator has a two-step protocol:
      //   1. popup sends "authorizing:github" (handshake) → main registers authorizeCallback
      //   2. popup sends "authorization:github:success:..." → main processes token
      // Since window.opener is null after GitHub COOP, we relay via BroadcastChannel
      // and simulate both steps with synthetic MessageEvents.
      (function () {
        var BASE_URL = 'https://round-butterfly-d457.m85592527.workers.dev';
        var bc = new BroadcastChannel('decap_oauth');
        bc.onmessage = function (e) {
          if (e.data && e.data.token) {
            var token = e.data.token;

            // Step 1: handshake - triggers handshakeCallback, registers authorizeCallback
            window.dispatchEvent(new MessageEvent('message', {
              data: 'authorizing:github',
              origin: BASE_URL,
              source: null
            }));

            // Step 2: after handshakeCallback runs (sync), authorizeCallback is ready
            setTimeout(function () {
              window.dispatchEvent(new MessageEvent('message', {
                data: 'authorization:github:success:' + JSON.stringify({ token: token, provider: 'github' }),
                origin: BASE_URL,
                source: null
              }));
            }, 50);
          }
        };
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>
</html>
